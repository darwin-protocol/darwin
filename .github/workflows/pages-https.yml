name: pages-https

"on":
  workflow_dispatch:
  workflow_run:
    workflows:
      - pages
    types:
      - completed
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write

jobs:
  enforce:
    if: ${{ vars.DARWIN_SITE_DOMAIN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce Pages HTTPS when certificate is ready
        env:
          GH_TOKEN: ${{ github.token }}
          DARWIN_SITE_DOMAIN: ${{ vars.DARWIN_SITE_DOMAIN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WAIT_SECONDS: "600"
        shell: bash
        run: |
          if ./ops/enforce_pages_https.sh "$DARWIN_SITE_DOMAIN"; then
            echo "HTTPS enforced for $DARWIN_SITE_DOMAIN"
          else
            echo "Certificate still pending for $DARWIN_SITE_DOMAIN; leaving workflow green so schedule can retry."
          fi

      - name: Export runtime hosting status
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DARWIN_SITE_DOMAIN: ${{ vars.DARWIN_SITE_DOMAIN }}
        shell: bash
        run: |
          python3 ops/export_runtime_status.py \
            --out web/public/runtime-status.json

      - name: Commit runtime status if it changed
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git diff --quiet -- web/public/runtime-status.json; then
            echo "runtime status unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/runtime-status.json
          git commit -m "Refresh public runtime status"
          git push
