services:
  site:
    image: caddy:2.10-alpine
    container_name: darwin-site
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/usedarwin/site:/srv/usedarwin/site:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - darwin-public

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: darwin-cloudflared
    restart: unless-stopped
    depends_on:
      - site
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_METRICS: 0.0.0.0:21123
    ports:
      - "127.0.0.1:21123:21123"
    networks:
      - darwin-public

networks:
  darwin-public:
    driver: bridge
