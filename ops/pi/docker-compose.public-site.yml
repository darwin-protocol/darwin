services:
  site:
    image: caddy:2.10-alpine
    container_name: darwin-site
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/usedarwin/site:/srv/usedarwin/site:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - darwin-public

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: darwin-cloudflared
    restart: unless-stopped
    depends_on:
      - site
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./${CLOUDFLARE_TUNNEL_CREDENTIALS_FILE:-cloudflared-credentials.json}:/etc/cloudflared/credentials.json:ro
    ports:
      - "127.0.0.1:21123:21123"
    networks:
      - darwin-public

networks:
  darwin-public:
    driver: bridge
